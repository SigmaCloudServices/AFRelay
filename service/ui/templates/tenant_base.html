<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AFRelay Portal{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/portal/static/css/custom.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
  <a class="navbar-brand fw-bold" href="/portal/dashboard">
    <i class="bi bi-lightning-charge-fill text-primary me-2"></i>AFRelay
  </a>
  <div class="d-flex align-items-center gap-3">
    <small class="text-muted">{{ tenant.name }}</small>
    <span class="badge bg-secondary">CUIT {{ tenant.cuit }}</span>
    <a href="/portal/logout" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-box-arrow-right"></i> Logout
    </a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar py-3">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/portal/dashboard">
            <i class="bi bi-house-fill me-2"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'api_key' %}active{% endif %}" href="/portal/api-key">
            <i class="bi bi-key-fill me-2"></i>API Key
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'certs' %}active{% endif %}" href="/portal/certs">
            <i class="bi bi-file-earmark-lock-fill me-2"></i>Certificados
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'transactions' %}active{% endif %}" href="/portal/transactions">
            <i class="bi bi-receipt me-2"></i>Transacciones
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'profile' %}active{% endif %}" href="/portal/profile">
            <i class="bi bi-person-fill me-2"></i>Perfil
          </a>
        </li>
      </ul>
    </nav>

    <main class="col-md-10 py-4 px-4">
      {% if flash %}
        <div class="alert alert-{{ flash.category }} alert-dismissible fade show">
          {{ flash.message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="/portal/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
