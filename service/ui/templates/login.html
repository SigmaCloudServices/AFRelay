<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if is_admin %}Admin Login{% else %}Tenant Login{% endif %} — AFRelay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/portal/static/css/custom.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card card shadow-lg">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi {% if is_admin %}bi-shield-lock-fill text-warning{% else %}bi-lightning-charge-fill text-primary{% endif %} fs-1"></i>
      <h4 class="mt-2 fw-bold">AFRelay</h4>
      <p class="text-muted small">{% if is_admin %}Panel de Administración{% else %}Portal de Clientes{% endif %}</p>
    </div>

    {% if error %}
      <div class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ action_url }}">
      {% if is_admin %}
        <div class="mb-3">
          <label class="form-label small text-muted">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
          </div>
        </div>
      {% else %}
        <div class="mb-3">
          <label class="form-label small text-muted">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="email@empresa.com" required autofocus>
          </div>
        </div>
      {% endif %}

      <div class="mb-4">
        <label class="form-label small text-muted">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn {% if is_admin %}btn-warning{% else %}btn-primary{% endif %} w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    {% if not is_admin %}
      <div class="text-center mt-3">
        <small class="text-muted">¿No tenés cuenta? Contactá al administrador.</small>
      </div>
    {% endif %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
