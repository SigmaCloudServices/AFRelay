<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AFRelay Admin{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/portal/static/css/custom.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
  <a class="navbar-brand fw-bold" href="/portal/admin/dashboard">
    <i class="bi bi-shield-lock-fill text-warning me-2"></i>AFRelay <span class="badge bg-warning text-dark ms-1">Admin</span>
  </a>
  <div class="d-flex align-items-center gap-3">
    <small class="text-muted">{{ admin_user }}</small>
    <a href="/portal/admin/logout" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-box-arrow-right"></i> Logout
    </a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar py-3">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/portal/admin/dashboard">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'tenants' %}active{% endif %}" href="/portal/admin/tenants">
            <i class="bi bi-people-fill me-2"></i>Tenants
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'prices' %}active{% endif %}" href="/portal/admin/prices">
            <i class="bi bi-tag-fill me-2"></i>Precios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'monitoring' %}active{% endif %}" href="/portal/admin/monitoring">
            <i class="bi bi-activity me-2"></i>Monitoreo
          </a>
        </li>
      </ul>
    </nav>

    <main class="col-md-10 py-4 px-4">
      {% if flash %}
        <div class="alert alert-{{ flash.category }} alert-dismissible fade show">
          {{ flash.message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="/portal/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
